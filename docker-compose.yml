services:
  postgres:
    image: postgres:16-alpine
    container_name: event_booking_db
    environment:
      POSTGRES_DB: event_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d event_booking"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: event_booking_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/event_booking
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: your-256-bit-secret-key-change-this-in-production-please
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"

volumes:
  postgres_data:
